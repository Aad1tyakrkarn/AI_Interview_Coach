version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ccode-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccode_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ccode}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccode} -d ${POSTGRES_DB:-ccode}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: ccode-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  node-api:
    build:
      context: ./packages/node-api
      dockerfile: ../../infra/docker/node-api.Dockerfile
    container_name: ccode-node-api
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ccode}:${POSTGRES_PASSWORD:-ccode_secret}@postgres:5432/${POSTGRES_DB:-ccode}
    restart: unless-stopped

  python-ml:
    build:
      context: ./packages/python-ml
      dockerfile: ../../infra/docker/python-ml.Dockerfile
    container_name: ccode-python-ml
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
    container_name: ccode-frontend
    ports:
      - "5173:5173"
    restart: unless-stopped

  admin:
    build:
      context: ./packages/admin
      dockerfile: ../../infra/docker/admin.Dockerfile
    container_name: ccode-admin
    ports:
      - "5174:5174"
    restart: unless-stopped

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: ../docker/nginx.Dockerfile
    container_name: ccode-nginx
    ports:
      - "80:80"
    depends_on:
      - node-api
      - python-ml
      - frontend
      - admin
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local
